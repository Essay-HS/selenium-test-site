<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Form Test</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <header>
        <h1>Form Test</h1>

        <nav>
            <a href="/">Home</a>
            <a href="/login">Login Test</a>
            <a href="/form">Form Test</a>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <form id="registration-form" method="post">
                <div class="form-group">
                    <label for="name">Name</label>

                    <input
                        id="name"
                        name="name"
                        type="text"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>

                    <input
                        id="email"
                        name="email"
                        type="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="role">Career Role</label>

                    <select id="role" name="role" required>
                        <option value="">Select a role</option>
                        <option value="QA Analyst">QA Analyst</option>
                        <option value="Database Administrator">
                            Database Administrator
                        </option>
                        <option value="Application Support">
                            Application Support
                        </option>
                    </select>
                </div>

                <fieldset>
                    <legend>Experience Level</legend>

                    <label>
                        <input
                            id="beginner"
                            name="experience"
                            type="radio"
                            value="Beginner"
                            required
                        >
                        Beginner
                    </label>

                    <label>
                        <input
                            id="intermediate"
                            name="experience"
                            type="radio"
                            value="Intermediate"
                        >
                        Intermediate
                    </label>

                    <label>
                        <input
                            id="advanced"
                            name="experience"
                            type="radio"
                            value="Advanced"
                        >
                        Advanced
                    </label>
                </fieldset>

                <div class="form-group">
                    <label>
                        <input
                            id="newsletter"
                            name="newsletter"
                            type="checkbox"
                            value="yes"
                        >
                        Subscribe to the test newsletter
                    </label>
                </div>

                <button id="submit-button" type="submit">
                    Submit Form
                </button>
            </form>
        </section>
    </main>
</body>
</html>
