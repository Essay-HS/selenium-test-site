<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login Test</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <header>
        <h1>Login Test</h1>

        <nav>
            <a href="/">Home</a>
            <a href="/login">Login Test</a>
            <a href="/form">Form Test</a>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <form id="login-form" method="post">
                <div class="form-group">
                    <label for="username">Username</label>

                    <input
                        id="username"
                        name="username"
                        type="text"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>

                    <input
                        id="password"
                        name="password"
                        type="password"
                        required
                    >
                </div>

                <button id="login-button" type="submit">
                    Log In
                </button>
            </form>

            {% if message %}
                <p
                    id="login-message"
                    class="{{ message_type }}"
                >
                    {{ message }}
                </p>
            {% endif %}
        </section>

        <section class="card">
            <h2>Practice Credentials</h2>

            <p>Username: testuser</p>
            <p>Password: Password123</p>
        </section>
    </main>
</body>
</html>
