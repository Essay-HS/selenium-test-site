<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login Test | Selley QA Lab</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <header class="site-header">
        <div class="nav-container">
            <a class="brand" href="/">
                <span class="brand-mark" aria-hidden="true">
    <svg
        viewBox="0 0 48 48"
        role="img"
        focusable="false"
    >
        <path
            class="brand-logo-background"
            d="M12 4h24c4.42 0 8 3.58 8 8v24c0 4.42-3.58 8-8 8H12c-4.42 0-8-3.58-8-8V12c0-4.42 3.58-8 8-8Z"
        />

        <path
            class="brand-logo-s"
            d="M31.5 15.4c-2.2-1.5-4.6-2.2-7.3-2.2-4.7 0-7.8 2.3-7.8 5.8 0 3.2 2.4 4.8 7.4 5.9 3.2.7 4.3 1.4 4.3 2.8 0 1.6-1.5 2.6-4 2.6-2.8 0-5.4-.9-7.7-2.8"
        />

        <path
            class="brand-logo-check"
            d="m27.5 33.2 3.2 3.2 6.8-7.4"
        />
    </svg>
</span>
                <span class="brand-text">Selley QA Lab</span>
            </a>

            <nav class="main-nav" aria-label="Main navigation">
                <a href="/">Home</a>
                <a href="/login" class="active">Login Test</a>
                <a href="/form">Form Test</a>
                <a href="{{ url_for('submissions') }}">Submissions</a>
                <a href="{{ url_for('contact') }}">
    Contact
</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <div class="page-container">
            <div class="page-header">
                <p class="eyebrow">Authentication Testing</p>

                <h1>Login validation</h1>

                <p>
                    Practice valid and invalid login scenarios using
                    Selenium WebDriver.
                </p>
            </div>

            <section class="form-card">
                <form id="login-form" method="post">
                    <div class="form-group">
                        <label for="username">Username</label>

                        <input
                            id="username"
                            name="username"
                            type="text"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>

                        <input
                            id="password"
                            name="password"
                            type="password"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button
                        id="login-button"
                        class="button button-primary"
                        type="submit"
                    >
                        Sign In
                    </button>
                </form>

                {% if message %}
                    <p
                        id="login-message"
                        class="{{ message_type }}"
                        aria-live="polite"
                    >
                        {{ message }}
                    </p>
                {% endif %}

                <div class="credentials-card">
                    <h2>Practice credentials</h2>
                    <p>Username: testuser</p>
                    <p>Password: Password123</p>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
