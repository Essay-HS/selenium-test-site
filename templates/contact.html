<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contact | Selley QA Lab</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <header class="site-header">
        <div class="nav-container">
            <a
                class="brand"
                href="{{ url_for('home') }}"
            >
                <span
                    class="brand-mark"
                    aria-hidden="true"
                >
                    <!-- Use the same SVG logo already used
                         in your other templates. -->
                </span>

                <span class="brand-text">
                    Selley QA Lab
                </span>
            </a>

            <nav
                class="main-nav"
                aria-label="Main navigation"
            >
                <a href="{{ url_for('home') }}">
                    Home
                </a>

                <a href="{{ url_for('login') }}">
                    Login Test
                </a>

                <a href="{{ url_for('form') }}">
                    Form Test
                </a>

                <a href="{{ url_for('submissions') }}">
                    Submissions
                </a>

                <a
                    class="active"
                    href="{{ url_for('contact') }}"
                >
                    Contact
                </a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        <div class="page-container">
            <section class="form-page-heading">
                <p class="eyebrow">
                    CONTACT SELLEY QA LAB
                </p>

                <h1>Send a message</h1>

                <p>
                    Use the form below to ask a question,
                    share feedback, or discuss a project.
                </p>
            </section>

            <section class="form-card">
                {% if error_message %}
                    <div
                        id="contact-error"
                        class="message error"
                        role="alert"
                    >
                        {{ error_message }}
                    </div>
                {% endif %}

                <form
                    id="contact-form"
                    method="POST"
                    action="{{ url_for('contact') }}"
                >
                    <div class="form-group">
                        <label for="contact-name">
                            Name
                        </label>

                        <input
                            id="contact-name"
                            name="name"
                            type="text"
                            autocomplete="name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="contact-email">
                            Email
                        </label>

                        <input
                            id="contact-email"
                            name="email"
                            type="email"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="contact-subject">
                            Subject
                        </label>

                        <input
                            id="contact-subject"
                            name="subject"
                            type="text"
                            maxlength="200"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="contact-message">
                            Message
                        </label>

                        <textarea
                            id="contact-message"
                            name="message"
                            rows="7"
                            maxlength="3000"
                            required
                        ></textarea>
                    </div>

                    <button
                        id="contact-submit"
                        class="primary-button"
                        type="submit"
                    >
                        Send Message
                    </button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
